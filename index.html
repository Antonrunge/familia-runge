<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09090b;--bg2:#111113;--bg3:#18181b;--bd:#27272a;--bd2:#3f3f46;--tx:#e4e4e7;--tx2:#a1a1aa;--tx3:#71717a;--tx4:#52525b;--green:#22c55e;--cyan:#22d3ee;--red:#f87171;--yellow:#fbbf24;--purple:#a78bfa;--orange:#fb923c;--pink:#f472b6}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
/* LOGIN */
#ls{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 50% 0%,#052e16 0%,var(--bg) 60%)}
.lb{background:var(--bg3);border:1px solid var(--bd);border-radius:16px;padding:36px;width:100%;max-width:360px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.lt{font-size:24px;font-weight:800;color:var(--green);margin-bottom:2px;letter-spacing:-0.5px}
.lsub{font-size:12px;color:var(--tx3);margin-bottom:24px}
/* APP LAYOUT */
#app{display:none;min-height:100vh}
#sb{width:216px;position:fixed;top:0;left:0;bottom:0;background:var(--bg2);border-right:1px solid var(--bd);overflow-y:auto;z-index:100;display:flex;flex-direction:column}
#ct{margin-left:216px;padding:24px;min-height:100vh}
/* SIDEBAR */
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid var(--bd)}
.sb-brand-name{font-size:15px;font-weight:800;color:var(--green);letter-spacing:-0.3px}
.sb-brand-sub{font-size:11px;color:var(--tx3);margin-top:2px}
.sb-period{padding:12px 10px;border-bottom:1px solid var(--bd)}
.sb-nav{padding:8px 0;flex:1}
.sbn{display:flex;align-items:center;gap:8px;padding:9px 14px;color:var(--tx2);font-size:13px;cursor:pointer;border-radius:8px;margin:1px 8px;border:none;background:none;width:calc(100% - 16px);text-align:left;transition:all .12s}
.sbn:hover{background:var(--bd);color:var(--tx)}
.sbn.act{background:#14532d;color:var(--green);font-weight:600}
.sb-add{padding:10px 12px;border-top:1px solid var(--bd)}
.sb-user{padding:10px 14px;font-size:11px;color:var(--tx3);border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
/* CONTENT */
.pg{max-width:1060px;margin:0 auto}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.ph h2{font-size:20px;font-weight:800;color:var(--tx);letter-spacing:-0.3px}
.ph-btns{display:flex;gap:8px}
/* KPI GRID */
.kg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.kc{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:14px;border-left:3px solid var(--cyan)}
.kv{font-size:17px;font-weight:800;color:var(--tx);margin-bottom:2px;letter-spacing:-0.3px}
.kl{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.ks{font-size:11px;color:var(--tx2);margin-top:4px}
/* CARDS / PANELS */
.cd{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:16px;margin-bottom:12px}
.ct{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.ox{overflow-x:auto}
/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px}
th{color:var(--tx3);font-size:9px;text-transform:uppercase;letter-spacing:.6px;padding:7px 10px;border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap;font-weight:600}
td{padding:7px 10px;border-bottom:1px solid #1c1c1e;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#1c1c1e}
.hi{color:var(--green);font-weight:700;text-align:right}
.neg{color:var(--red);font-weight:700;text-align:right}
/* INPUTS & BUTTONS */
input,select,textarea{background:var(--bg);border:1px solid var(--bd2);color:var(--tx);border-radius:7px;padding:9px 11px;font-size:13px;width:100%;font-family:inherit;transition:border .12s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
select option{background:var(--bg3)}
.pb{background:#166534;color:#dcfce7;border:none;border-radius:7px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:background .12s}
.pb:hover{background:#15803d}
.gb{background:var(--bd);color:var(--tx);border:none;border-radius:7px;padding:9px 16px;font-size:13px;cursor:pointer;transition:background .12s}
.gb:hover{background:var(--bd2)}
.ab{background:#0891b2;color:#fff;border:none;border-radius:7px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer}
.ab:hover{background:#0e7490}
.db{background:transparent;border:1px solid #7f1d1d;color:var(--red);border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer}
.db:hover{background:#7f1d1d;color:#fff}
.eb{background:transparent;border:1px solid var(--bd2);color:var(--tx2);border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer}
.eb:hover{background:var(--bd2)}
/* MODAL */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:16px}
.mb{background:var(--bg3);border:1px solid var(--bd);border-radius:14px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;padding:24px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mh h2{font-size:16px;font-weight:800;letter-spacing:-0.2px}
.xb{background:none;border:none;color:var(--tx3);font-size:22px;cursor:pointer;padding:2px 6px;line-height:1}
.xb:hover{color:var(--red)}
/* FORM */
.fi{margin-bottom:12px}
.fi label{display:block;font-size:10px;color:var(--tx3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
/* BADGES */
.bg-r{background:#14532d;color:#86efac;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.4px}
.bg-d{background:#450a0a;color:#fca5a5;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.4px}
.bg-f{background:#0c4a6e;color:#7dd3fc;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700}
/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;padding:12px 18px;font-size:13px;z-index:300;display:none;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
/* PROGRESS */
.prg-bg{background:var(--bd);border-radius:4px;height:7px;overflow:hidden;margin-top:8px}
.prg-fill{height:100%;border-radius:4px;transition:width .4s}
/* DINHEIRO LIVRE */
.dl-bloco{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;margin-bottom:12px;overflow:hidden}
.dl-hdr{padding:12px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--bd)}
.dl-row{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-bottom:1px solid #1c1c1e}
.dl-row:last-child{border-bottom:none}
.dl-lbl{font-size:13px;color:var(--tx2)}
.dl-val{font-size:14px;font-weight:700}
.dl-total{display:flex;justify-content:space-between;align-items:center;padding:16px;background:#052e16;border-top:2px solid var(--green)}
/* CARTÃO */
.cc{background:linear-gradient(135deg,#0f2340,#1e3a5f);border:1px solid #1d4ed8;border-radius:14px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
.cc::after{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;background:rgba(34,211,238,.06);border-radius:50%}
/* SEP */
.sep{height:1px;background:var(--bd);margin:14px 0}
/* TYPE TOGGLE */
.type-tog{display:flex;gap:6px;margin-bottom:16px}
.t-btn{flex:1;padding:10px;border:1px solid var(--bd2);background:var(--bg);color:var(--tx2);border-radius:7px;cursor:pointer;font-size:13px;font-weight:700;transition:all .12s}
.t-btn.on-r{background:#14532d;border-color:#16a34a;color:#86efac}
.t-btn.on-d{background:#450a0a;border-color:#dc2626;color:#fca5a5}
/* EMPTY */
.emp{text-align:center;padding:36px 20px;color:var(--tx4);font-size:13px}
/* MOBILE */
@media(max-width:700px){
  #sb{width:100%;position:relative}
  #ct{margin-left:0;padding:14px}
  .g2,.g3{grid-template-columns:1fr}
  .kg{grid-template-columns:1fr 1fr}
}
</style>
</head>

<script>
// ── FIREBASE CONFIG ──────────────────────────────────────────────────────────
// ⚠️  SUBSTITUA com as configurações do SEU projeto Firebase pessoal
// console.firebase.google.com → Adicionar projeto → App Web → copiar config
var firebaseConfig={
  apiKey:"AIzaSyDKv_gBywsemD-AIK2DzJtt7XGPByWkJ6k",
  authDomain:"familia-runge.firebaseapp.com",
  projectId:"familia-runge",
  storageBucket:"familia-runge.firebasestorage.app",
  messagingSenderId:"357605906253",
  appId:"1:357605906253:web:05d0b46f870a4328480904"
};
firebase.initializeApp(firebaseConfig);
var auth=firebase.auth(),db=firebase.firestore();

// ── CONSTANTES ───────────────────────────────────────────────────────────────
var MESES=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

var CAT_DESP={
  "Casa":["Aluguel","Água","Luz","Internet","Mercado","Padaria","Almoço","Pizza","Frango","Lanche","Outros Casa"],
  "Mamãe":["Fraldas","Vitaminas Mamãe","Cuidadora","Remédios Mamãe","Equipamentos","Outros Mamãe"],
  "Cachorros":["Ração","Banho","Cama/Tapete","Veterinário","Outros Cachorros"],
  "Saúde":["Academia","Suplementos/Whey","Vitaminas","Remédios","Outros Saúde"],
  "Beleza":["Unhas","Maquiagem Capilar","Roupas","Meias","Cabelo","Outros Beleza"],
  "Marcos":["Ajuda Marcos"],
  "Geovanna":["Ajuda Geovanna"],
  "Lorran":["Ajuda Lorran"],
  "Transporte":["Consórcio Honda","Estacionamento","Combustível","Outros Transporte"],
  "Fé":["Oferta à Deus","Dízimo"],
  "Cartões":["Fatura Renner","Fatura Inter Josiane","Fatura Cartão Josiane","Outra Fatura"],
  "Outros":["Material Elétrico","Ferramentas","Eletrônicos","Presente","Outros"]
};
var CAT_REC={
  "Anton":["Salário Anton","Comissão Serviços","Comissão Produtos","Outros Anton"],
  "Josiane":["Salário Josiane","Comissão Josiane","Outros Josiane"],
  "Mamãe":["LOAS","Outros Mamãe"],
  "Irmão":["Ajuda Irmão"],
  "Outros":["Receita Extraordinária","Venda","Restituição","Outros"]
};
var PESSOAS=["Anton","Josiane","Mamãe","Casa","Cachorros","Marcos","Geovanna","Lorran","Geral"];
var FORMAS=["Dinheiro","PIX","Débito","Crédito"];
var NAV=[["dash","📊","Dashboard"],["livre","💰","Dinheiro Livre"],["lanc","📋","Lançamentos"],["cartoes","💳","Cartões"],["mamae","👵","Mamãe"],["familia","👨‍👩‍👧","Família"],["anton","👨","Anton"],["josiane","👩","Josiane"],["config","⚙️","Configurações"]];

// Fixos pré-configurados (editáveis em Configurações)
var FIXOS_REC_PAD=[
  {desc:"Salário Anton",valor:3600,pessoa:"Anton"},
  {desc:"Salário Josiane",valor:3600,pessoa:"Josiane"},
  {desc:"LOAS",valor:1500,pessoa:"Mamãe"},
  {desc:"Ajuda do Irmão",valor:750,pessoa:"Mamãe"}
];
var FIXOS_DESP_PAD=[
  {desc:"Aluguel",valor:3202.50,pessoa:"Casa"},
  {desc:"EDP / Luz",valor:120,pessoa:"Casa"},
  {desc:"SAAE / Água",valor:123,pessoa:"Casa"},
  {desc:"Internet",valor:123.48,pessoa:"Casa"},
  {desc:"Academia (NEON)",valor:312.10,pessoa:"Saúde"},
  {desc:"Cuidadora Mamãe",valor:1200,pessoa:"Mamãe"},
  {desc:"Consórcio Honda",valor:556.44,pessoa:"Transporte"}
];

// ── ESTADO ───────────────────────────────────────────────────────────────────
var S={tab:"dash",month:new Date().getMonth(),year:new Date().getFullYear(),filtroLanc:"todos"};
var D={lanc:[],cartoes:[],fixosRec:null,fixosDesp:null};
var CU=null,_ls=[];

// ── UTILS ────────────────────────────────────────────────────────────────────
function hj(){return new Date().toISOString().slice(0,10);}
function fdt(d){if(!d)return"—";var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function fmt(v){return"R$\u00a0"+(+v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function es(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmy(arr,m,y){return(arr||[]).filter(function(r){var d=r.date||"";return d.startsWith(y+"-"+String(m+1).padStart(2,"0"));});}
function showToast(msg,col){var t=document.getElementById("toast");t.innerHTML=msg;t.style.display="block";t.style.borderColor=col||"var(--bd2)";clearTimeout(t._t);t._t=setTimeout(function(){t.style.display="none";},3000);}
function omod(h){var o=document.getElementById("ov");o.style.display="flex";o.innerHTML='<div class="mb">'+h+'</div>';}
function cmod(){var o=document.getElementById("ov");o.style.display="none";o.innerHTML="";}
function mhdr(t){return'<div class="mh"><h2>'+t+'</h2><button class="xb" onclick="cmod()">×</button></div>';}
function kp(l,v,s,cor){return'<div class="kc"'+(cor?'style="border-left-color:'+cor+'"':'')+'>'+
  '<div class="kl">'+l+'</div><div class="kv">'+v+'</div>'+(s?'<div class="ks">'+s+'</div>':'')+'</div>';}
function getFixosRec(){
  var fr=D.fixosRec||FIXOS_REC_PAD;
  // Migração automática: Ajuda do Irmão sempre pertence à Mamãe
  fr.forEach(function(f){
    if((f.desc||"").toLowerCase().indexOf("irm")>=0&&f.pessoa!=="Mamãe"){f.pessoa="Mamãe";}
  });
  return fr;
}
function getFixosDesp(){return D.fixosDesp||FIXOS_DESP_PAD;}
function totFixRec(){return getFixosRec().reduce(function(s,f){return s+f.valor;},0);}
function totFixDesp(){return getFixosDesp().reduce(function(s,f){return s+f.valor;},0);}
// Fixos de receita não lançados manualmente este mês (evita dupla contagem)
function fixosRecAuto(lmR){
  return getFixosRec().filter(function(f){
    return !lmR.some(function(r){
      var desc=(r.descricao||"").toLowerCase();
      var cat=(r.categoria||"").toLowerCase();
      var fd=f.desc.toLowerCase();
      return cat===fd||desc===fd||cat.indexOf(fd)>=0||fd.indexOf(cat)>=0;
    });
  });
}
function dtMes(){return S.year+"-"+String(S.month+1).padStart(2,"0")+"-01";}
function nomeMes(){return MESES[S.month]+" "+S.year;}

// ── GRÁFICOS SVG ─────────────────────────────────────────────────────────────
var CORES=["#22d3ee","#22c55e","#f87171","#fbbf24","#a78bfa","#fb923c","#f472b6","#60a5fa","#34d399","#e879f9"];
function piC(data){
  if(!data||!data.length)return'<div class="emp">Sem dados</div>';
  var tot=data.reduce(function(s,d){return s+d.v;},0);
  if(!tot)return'<div class="emp">Sem dados</div>';
  var cx=95,cy=95,r=72,a=0,paths="",legs="";
  data.slice(0,9).forEach(function(d,i){
    var sl=d.v/tot*2*Math.PI;
    var x1=cx+r*Math.sin(a),y1=cy-r*Math.cos(a);a+=sl;
    var x2=cx+r*Math.sin(a),y2=cy-r*Math.cos(a);
    var big=sl>Math.PI?1:0;
    var col=CORES[i%CORES.length];
    if(data.length===1)paths+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+col+'"/>';
    else paths+='<path d="M'+cx+','+cy+' L'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+big+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+' Z" fill="'+col+'" stroke="#18181b" stroke-width="1.5"/>';
    legs+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">'+
      '<div style="width:9px;height:9px;border-radius:2px;flex-shrink:0;background:'+col+'"></div>'+
      '<span style="font-size:11px;color:var(--tx2)">'+es(d.n)+'<br><b style="color:var(--tx)">'+Math.round(d.v/tot*100)+'% · '+fmt(d.v)+'</b></span></div>';
  });
  return'<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">'+
    '<svg width="190" height="190" viewBox="0 0 190 190">'+paths+'</svg>'+
    '<div>'+legs+'</div></div>';
}
function bhC(data,col){
  if(!data||!data.length)return'<div class="emp">Sem dados</div>';
  var max=Math.max.apply(null,data.map(function(d){return d.v;}));
  if(!max)return'';
  var H=data.length*30,W=300,bars=data.map(function(d,i){
    var bw=Math.round(d.v/max*(W-120));
    var y=i*30+4;
    return'<text x="0" y="'+(y+14)+'" font-size="11" fill="var(--tx2)">'+es(d.n.length>14?d.n.slice(0,13)+"…":d.n)+'</text>'+
      '<rect x="104" y="'+(y+2)+'" width="'+bw+'" height="18" rx="3" fill="'+(col||CORES[i%CORES.length])+'"/>'+
      '<text x="'+(109+bw)+'" y="'+(y+15)+'" font-size="10" fill="var(--tx)" font-weight="700">'+fmt(d.v)+'</text>';
  }).join("");
  return'<div class="ox"><svg width="'+(W+60)+'" height="'+Math.max(30,H)+'" style="min-width:280px">'+bars+'</svg></div>';
}
function bvC(data,col){
  if(!data||!data.length)return'<div class="emp">Sem dados</div>';
  var max=Math.max.apply(null,data.map(function(d){return d.v;}));if(!max)return'';
  var bw=36,gap=10,pad=24,H=140,W=pad*2+data.length*(bw+gap);
  var bars=data.map(function(d,i){
    var bh=Math.max(2,Math.round(d.v/max*(H-pad-18)));
    var x=pad+i*(bw+gap),y=H-pad-bh;
    var lbl=d.v>=1000?(d.v/1000).toFixed(1)+"k":Math.round(d.v);
    return'<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bh+'" rx="4" fill="'+(col||CORES[i%CORES.length])+'"/>'+
      '<text x="'+(x+bw/2)+'" y="'+(y-4)+'" text-anchor="middle" font-size="9" fill="var(--tx2)">'+lbl+'</text>'+
      '<text x="'+(x+bw/2)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9" fill="var(--tx3)">'+es(d.n.length>6?d.n.slice(0,5)+"…":d.n)+'</text>';
  }).join("");
  return'<div class="ox"><svg width="'+W+'" height="'+H+'" style="min-width:'+W+'px">'+bars+'</svg></div>';
}

// ── AUTH ─────────────────────────────────────────────────────────────────────
function doLogin(){
  var em=document.getElementById("l-em").value.trim();
  var pw=document.getElementById("l-pw").value;
  var err=document.getElementById("l-err");err.style.display="none";
  auth.signInWithEmailAndPassword(em,pw).catch(function(){err.textContent="Email ou senha incorretos.";err.style.display="block";});
}
function doLogout(){auth.signOut();}
auth.onAuthStateChanged(function(user){
  if(user){
    CU={email:user.email,uid:user.uid};
    document.getElementById("ls").style.display="none";
    document.getElementById("app").style.display="block";
    setupListeners();
  }else{
    document.getElementById("ls").style.display="flex";
    document.getElementById("app").style.display="none";
    _ls.forEach(function(u){u();});_ls=[];
    D={lanc:[],cartoes:[],fixosRec:null,fixosDesp:null};
  }
});

// ── LISTENERS FIRESTORE ──────────────────────────────────────────────────────
function setupListeners(){
  function ltn(col,fn){var u=db.collection(col).onSnapshot(function(s){var a=[];s.forEach(function(d){a.push(Object.assign({id:d.id},d.data()));});fn(a);rT();});_ls.push(u);}
  ltn("lancamentos",function(a){D.lanc=a.sort(function(a,b){return(b.date||"").localeCompare(a.date||"");});});
  ltn("cartoes",function(a){D.cartoes=a;});
  var uf=db.collection("config").doc("fixos").onSnapshot(function(doc){
    if(doc.exists){
      var fr=doc.data().receitas||null;
      var fd=doc.data().despesas||null;
      // Migração automática: Ajuda do Irmão → pessoa Mamãe
      if(fr)fr.forEach(function(f){if((f.desc||"").toLowerCase().indexOf("irm")>=0)f.pessoa="Mamãe";});
      D.fixosRec=fr;D.fixosDesp=fd;
      // Persiste a migração no Firestore para não depender de migração a cada load
      if(fr&&fr.some(function(f){return(f.desc||"").toLowerCase().indexOf("irm")>=0&&f.pessoa==="Mamãe";})){
        db.collection("config").doc("fixos").update({receitas:fr}).catch(function(){});
      }
    }
    rT();
  });
  _ls.push(uf);
  rAll();
}

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function rSb(){
  var mn=S.month,yr=S.year;
  var opM=MESES.map(function(m,i){return'<option value="'+i+'"'+(i===mn?" selected":"")+">"+m+"</option>";}).join("");
  var opY=[2024,2025,2026,2027].map(function(y){return"<option"+(y===yr?" selected":"")+">"+y+"</option>";}).join("");
  var nav=NAV.map(function(n){return'<button class="sbn'+(S.tab===n[0]?" act":"")+'" onclick="S.tab=\''+n[0]+'\';rT()">'+n[1]+' '+n[2]+'</button>';}).join("");
  document.getElementById("sb").innerHTML=
    '<div class="sb-brand"><div class="sb-brand-name">💰 Finanças</div><div class="sb-brand-sub">Anton & Josiane Runge</div></div>'
    +'<div class="sb-period">'
    +'<select onchange="S.month=+this.value;rT()" style="margin-bottom:6px;font-size:12px">'+opM+'</select>'
    +'<select onchange="S.year=+this.value;rT()" style="font-size:12px">'+opY+'</select>'
    +'</div>'
    +'<div class="sb-nav">'+nav+'</div>'
    +'<div class="sb-add"><button class="pb" onclick="openLanc()" style="width:100%;font-size:13px;padding:10px">＋ Novo Lançamento</button></div>'
    +'<div class="sb-user"><span>'+es(CU?CU.email:"")+'</span><button class="gb" onclick="doLogout()" style="padding:4px 10px;font-size:11px">Sair</button></div>';
}
function rT(){
  var lm=fmy(D.lanc,S.month,S.year);
  var lmR=lm.filter(function(r){return r.tipo==="receita";});
  var lmD=lm.filter(function(r){return r.tipo==="despesa";});
  var h="";
  if(S.tab==="dash")h=rDash(lm,lmR,lmD);
  else if(S.tab==="livre")h=rLivre(lmR,lmD);
  else if(S.tab==="lanc")h=rLanc(lm);
  else if(S.tab==="cartoes")h=rCartoes();
  else if(S.tab==="mamae")h=rMamae(lmR,lmD);
  else if(S.tab==="familia")h=rFamilia(lmD);
  else if(S.tab==="anton")h=rPessoa("Anton","👨","#3b82f6",lm);
  else if(S.tab==="josiane")h=rPessoa("Josiane","👩","#f472b6",lm);
  else if(S.tab==="config")h=rConfig();
  document.getElementById("ct").innerHTML=h;
}
function rAll(){rSb();rT();}

// ── DASHBOARD ────────────────────────────────────────────────────────────────
function rDash(lm,lmR,lmD){
  var fauto=fixosRecAuto(lmR);
  var tFauto=fauto.reduce(function(s,f){return s+f.valor;},0);
  var tR=lmR.reduce(function(s,r){return s+r.valor;},0)+tFauto;
  var tD=lmD.reduce(function(s,r){return s+r.valor;},0);
  var saldo=tR-tD;
  function soma(arr,campo,val){return arr.filter(function(r){return r[campo]===val;}).reduce(function(s,r){return s+r.valor;},0);}
  var tMercado=lmD.filter(function(r){return["Mercado","Padaria"].indexOf(r.categoria)>=0;}).reduce(function(s,r){return s+r.valor;},0);
  var tAlim=lmD.filter(function(r){return["Almoço","Pizza","Frango","Lanche"].indexOf(r.categoria)>=0;}).reduce(function(s,r){return s+r.valor;},0);
  var tMamae=soma(lmD,"pessoa","Mamãe");
  var tFilhos=["Marcos","Geovanna","Lorran"].reduce(function(s,p){return s+soma(lmD,"pessoa",p);},0);
  var tCachorros=soma(lmD,"pessoa","Cachorros");
  // Gráficos
  var byP={};lmD.forEach(function(r){var p=r.pessoa||"Outros";byP[p]=(byP[p]||0)+r.valor;});
  var pieD=Object.keys(byP).map(function(k){return{n:k,v:byP[k]};}).sort(function(a,b){return b.v-a.v;});
  var byCat={};lmD.forEach(function(r){var c=r.categoria||r.pessoa||"Outros";byCat[c]=(byCat[c]||0)+r.valor;});
  var barD=Object.keys(byCat).map(function(k){return{n:k,v:byCat[k]};}).sort(function(a,b){return b.v-a.v;}).slice(0,8);
  var saldoReal=tR-totFixDesp()-tD;
  var corReal=saldoReal>=0?"#22c55e":"#f87171";
  return'<div class="pg"><div class="ph"><h2>📊 Dashboard — '+nomeMes()+'</h2></div>'
    +'<div class="kg">'
    +kp("Receitas",fmt(tR),lmR.length+" lançamentos","#22c55e")
    +kp("Desp. Variáveis",fmt(tD),lmD.length+" lançamentos","#f87171")
    +kp("Fixos Automáticos",fmt(totFixDesp()),"aluguel/cuidadora/etc","#f87171")
    +kp("Saldo Disponível",fmt(saldoReal),saldoReal>=0?"✅ receitas − fixos − variáveis":"⚠️ negativo",corReal)
    +kp("Mercado",fmt(tMercado),"mercado + padaria","#22d3ee")
    +kp("Alimentação",fmt(tAlim),"almoço/pizza/lanche","#22d3ee")
    +kp("Mamãe",fmt(tMamae),"gastos da mamãe","#a78bfa")
    +kp("Filhos",fmt(tFilhos),"Marcos/Geovanna/Lorran","#fbbf24")
    +kp("Cachorros",fmt(tCachorros),"","#fb923c")
    +'</div>'
    +'<div class="g2" style="gap:12px">'
    +'<div class="cd"><div class="ct">Gastos por Pessoa / Grupo</div>'+piC(pieD)+'</div>'
    +'<div class="cd"><div class="ct">Top Categorias de Despesa</div>'+bhC(barD,"#f87171")+'</div>'
    +'</div>'
    +'<div class="cd"><div class="ct">Referência Mensal — Receitas Fixas</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:8px">'
    +getFixosRec().map(function(f){return'<div style="background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;min-width:140px">'+
      '<div style="font-size:11px;color:var(--tx2)">'+es(f.desc)+'</div>'+
      '<div style="font-size:15px;font-weight:700;color:#22c55e;margin-top:2px">'+fmt(f.valor)+'</div></div>';}).join("")
    +'</div>'
    +'<div style="display:flex;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--bd)">'+
      '<span style="color:var(--tx3);font-size:12px">Total referência mensal</span>'+
      '<span style="color:#22c55e;font-weight:700">'+fmt(totFixRec())+'</span></div>'
    +'</div>'
    +'</div>';
}

// ── DINHEIRO LIVRE (Opção B) ─────────────────────────────────────────────────
// Saldo = Receitas lançadas − Fixos automáticos − Variáveis lançados
function rLivre(lmR,lmD){
  var fauto=fixosRecAuto(lmR);
  var tFauto=fauto.reduce(function(s,f){return s+f.valor;},0);
  var tR=lmR.reduce(function(s,r){return s+r.valor;},0)+tFauto;
  var tVar=lmD.reduce(function(s,r){return s+r.valor;},0);
  var tFixD=totFixDesp();
  var tFixR=totFixRec();
  var saldo=tR-tFixD-tVar;
  var livreProj=tFixR-tFixD;
  var corS=saldo>=0?"#22c55e":"#f87171";
  var corP=livreProj>=0?"#22c55e":"#f87171";
  var totalGeral=tFixD+tVar||1;
  var fixRows=getFixosDesp().map(function(f){
    var pct=Math.round(f.valor/totalGeral*100);
    return'<div class="dl-row"><span class="dl-lbl"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#f87171;margin-right:6px"></span>'+es(f.desc)+'</span>'
      +'<span style="display:flex;align-items:center;gap:10px"><span style="font-size:10px;color:var(--tx3);background:#27272a;padding:2px 6px;border-radius:10px">'+pct+'%</span>'
      +'<span class="dl-val" style="color:var(--red)">−'+fmt(f.valor)+'</span></span></div>';
  }).join("");
  var byCat={};lmD.forEach(function(r){var c=r.categoria||r.pessoa||"Outros";byCat[c]=(byCat[c]||0)+r.valor;});
  var varRows=Object.keys(byCat).sort(function(a,b){return byCat[b]-byCat[a];}).map(function(cat){
    var v=byCat[cat];var pct=Math.round(v/totalGeral*100);
    return'<div class="dl-row"><span class="dl-lbl"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#fbbf24;margin-right:6px"></span>'+es(cat)+'</span>'
      +'<span style="display:flex;align-items:center;gap:10px"><span style="font-size:10px;color:var(--tx3);background:#27272a;padding:2px 6px;border-radius:10px">'+pct+'%</span>'
      +'<span class="dl-val" style="color:var(--yellow)">−'+fmt(v)+'</span></span></div>';
  }).join("");
  return'<div class="pg"><div class="ph"><h2>💰 Dinheiro Livre — '+nomeMes()+'</h2>'
    +'<div style="font-size:12px;color:var(--tx3)">Saldo = Receitas − Fixos − Variáveis</div></div>'
    +'<div class="g2" style="gap:12px">'
    +'<div>'
    +'<div class="dl-bloco"><div class="dl-hdr" style="color:#22c55e;background:#052e16">📥 Receitas do Mês</div>'
    +'<div class="dl-row"><span class="dl-lbl">Receitas lançadas</span><span class="dl-val" style="color:#22c55e">+'+fmt(tR)+'</span></div>'
    +'<div class="dl-row" style="border-bottom:none"><span class="dl-lbl" style="color:var(--tx3);font-size:11px">Referência mensal</span><span style="color:var(--tx3);font-size:12px">'+fmt(tFixR)+'</span></div>'
    +'</div>'
    +'<div class="dl-bloco"><div class="dl-total" style="border-top:none;padding:20px 16px">'
    +'<div><div style="font-size:11px;color:var(--tx3);margin-bottom:4px">💰 SALDO REAL DO MÊS</div>'
    +'<div style="font-size:10px;color:var(--tx3)">Receitas − Fixos automáticos − Variáveis lançados</div></div>'
    +'<span style="font-size:26px;font-weight:800;color:'+corS+'">'+ fmt(saldo)+'</span></div></div>'
    +'<div class="dl-bloco"><div class="dl-hdr" style="color:var(--cyan)">📆 Projeção Mensal</div>'
    +'<div class="dl-row"><span class="dl-lbl">Receitas fixas</span><span class="dl-val" style="color:#22c55e">+'+fmt(tFixR)+'</span></div>'
    +'<div class="dl-row"><span class="dl-lbl">(−) Total fixos</span><span class="dl-val" style="color:var(--red)">−'+fmt(tFixD)+'</span></div>'
    +'<div class="dl-row" style="border-bottom:none"><span class="dl-lbl" style="font-weight:700">= Sobra p/ variáveis</span><span class="dl-val" style="color:'+corP+'">'+ fmt(livreProj)+'</span></div>'
    +'</div>'
    +'</div>'
    +'<div>'
    +'<div class="dl-bloco"><div class="dl-hdr" style="color:var(--red);background:#450a0a">📌 FIXOS AUTOMÁTICOS — '+fmt(tFixD)+'</div>'
    +fixRows
    +'<div style="padding:10px 16px;font-size:10px;color:var(--tx3);border-top:1px solid var(--bd)">⚙️ Altere os valores em Configurações</div>'
    +'</div>'
    +(tVar>0
      ?'<div class="dl-bloco"><div class="dl-hdr" style="color:var(--yellow)">📊 VARIÁVEIS LANÇADOS — '+fmt(tVar)+'</div>'+varRows+'</div>'
      :'<div class="cd"><div class="emp">Nenhum gasto variável lançado este mês.<br>Use ＋ Novo Lançamento para registrar.</div></div>')
    +'</div></div>'
    +(saldo<0?'<div style="background:#450a0a;border:1px solid #7f1d1d;border-radius:10px;padding:14px;margin-top:12px;font-size:13px;color:#fca5a5">⚠️ Saldo negativo em '+fmt(Math.abs(saldo))+'. Os variáveis ultrapassaram o que sobrou após os fixos.</div>':'')+'</div>';
}

// ── LANÇAMENTOS ──────────────────────────────────────────────────────────────
function rLanc(lm){
  var f=S.filtroLanc||"todos";
  var lmR=lm.filter(function(r){return r.tipo==="receita";});
  var lmD=lm.filter(function(r){return r.tipo==="despesa";});
  // Fixos de receita automáticos (LOAS, Ajuda Irmão, etc.) não lançados manualmente
  var fauto=fixosRecAuto(lmR);
  var tFauto=fauto.reduce(function(s,f){return s+f.valor;},0);
  var tR=lmR.reduce(function(s,r){return s+r.valor;},0)+tFauto;
  var tD=lmD.reduce(function(s,r){return s+r.valor;},0);
  var saldoDisp=tR-totFixDesp()-tD;
  // Linhas dos fixos automáticos de receita (aparecem no topo, marcados como AUTO)
  var autoRows=(f==="despesa"?"":fauto.map(function(fx){
    return'<tr style="opacity:0.8">'
      +'<td style="color:var(--tx3)">01/'+String(S.month+1).padStart(2,"0")+"/"+S.year+'</td>'
      +'<td><span class="bg-r">REC</span> <span style="font-size:9px;background:#164e63;color:#22d3ee;padding:1px 5px;border-radius:8px">AUTO</span></td>'
      +'<td style="color:var(--tx2)">'+es(fx.desc)+'</td>'
      +'<td style="color:var(--tx2)">'+es(fx.desc)+'</td>'
      +'<td><span style="font-size:11px;color:var(--tx3)">'+es(fx.pessoa||"")+'</span></td>'
      +'<td style="font-size:11px;color:var(--tx3)">Automático</td>'
      +'<td class="hi">+'+fmt(fx.valor)+'</td>'
      +'<td style="font-size:10px;color:var(--tx3)">fixo</td>'
      +'</tr>';
  }).join(""));
  function fBtn(v,l){var on=f===v;return'<button onclick="S.filtroLanc=\''+v+'\';rT()" style="padding:6px 14px;font-size:12px;border-radius:20px;cursor:pointer;border:1px solid '+(on?"var(--green);background:#052e16;color:var(--green)":"var(--bd2);background:var(--bg);color:var(--tx2)")+'">' +l+'</button>';}
  var lf=f==="receita"?lmR:f==="despesa"?lmD:lm;
  var rows=lf.map(function(r){
    var isR=r.tipo==="receita";
    var badge=isR?'<span class="bg-r">REC</span>':'<span class="bg-d">DESP</span>';
    var parc=r.parcelas>1?' <span style="font-size:10px;color:var(--tx3)">('+r.parcelaAtual+'/'+r.parcelas+')</span>':'';
    return'<tr><td>'+fdt(r.date)+'</td><td>'+badge+'</td>'
      +'<td style="color:var(--tx)">'+es(r.descricao)+parc+'</td>'
      +'<td style="color:var(--tx2)">'+es(r.categoria||"")+'</td>'
      +'<td><span style="font-size:11px;color:var(--tx3)">'+es(r.pessoa||"")+'</span></td>'
      +'<td style="font-size:11px;color:var(--tx3)">'+es(r.formaPagamento||"")+(r.cartaoNome?' · '+es(r.cartaoNome):'')+'</td>'
      +'<td class="'+(isR?"hi":"neg")+'">'+(isR?"+":"−")+fmt(r.valor)+'</td>'
      +'<td style="white-space:nowrap"><button class="eb" onclick="openLanc(\''+r.id+'\')">✏️</button> <button class="db" onclick="delLanc(\''+r.id+'\',\''+es(r.descricao)+'\')">🗑</button></td>'
      +'</tr>';
  }).join("");
  return'<div class="pg">'
    +'<div class="ph"><h2>📋 Lançamentos — '+nomeMes()+'</h2><button class="ab" onclick="openLanc()">＋ Novo</button></div>'
    +'<div class="kg">'
    +kp("Receitas",fmt(tR),(lmR.length+fauto.length)+" entradas","#22c55e")
    +kp("Desp. Variáveis",fmt(tD),lmD.length+" lançamentos","#f87171")
    +kp("Fixos Auto.",fmt(totFixDesp()),"automáticos","#f87171")
    +kp("Saldo Disponível",fmt(saldoDisp),saldoDisp>=0?"✅ após fixos":"⚠️ negativo",saldoDisp>=0?"#22c55e":"#f87171")
    +'</div>'
    +(fauto.length?'<div style="background:#0c1a2e;border:1px solid #1d4ed8;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#93c5fd">🔄 <b>Receitas automáticas:</b> '+fauto.map(function(f){return es(f.desc)+' ('+fmt(f.valor)+')';}).join(', ')+' — aparecem na tabela como AUTO e entram no saldo.</div>':'')
    +'<div style="display:flex;gap:8px;margin-bottom:14px">'+fBtn("todos","Todos")+fBtn("receita","📥 Receitas")+fBtn("despesa","📤 Despesas")+'</div>'
    +'<div class="cd"><div class="ox"><table><thead><tr><th>Data</th><th>Tipo</th><th>Descrição</th><th>Categoria</th><th>Pessoa</th><th>Pgto</th><th style="text-align:right">Valor</th><th></th></tr></thead><tbody>'
    +autoRows+rows
    +(rows.length===0&&autoRows.length===0?'<tr><td colspan="8" style="text-align:center;color:var(--tx3);padding:24px">Nenhum lançamento neste período</td></tr>':'')
    +'</tbody></table></div></div>'
    +'</div>';
}

// ── CARTÕES ──────────────────────────────────────────────────────────────────
function rCartoes(){
  var ms=S.year+"-"+String(S.month+1).padStart(2,"0");
  var cartoes=D.cartoes.slice().sort(function(a,b){return a.nome.localeCompare(b.nome);});
  var cards=cartoes.map(function(c){
    var fat=D.lanc.filter(function(r){return r.tipo==="despesa"&&r.cartaoId===c.id&&(r.date||"").startsWith(ms);});
    var tFat=fat.reduce(function(s,r){return s+r.valor;},0);
    var lim=c.limite||0;lim=parseFloat(lim)||0;
    var livre=lim-tFat;
    var pct=lim?Math.min(100,Math.round(tFat/lim*100)):0;
    var cor=pct>80?"#f87171":pct>50?"#fbbf24":"#22c55e";
    var rows=fat.slice(0,6).map(function(r){return'<tr><td>'+fdt(r.date)+'</td><td>'+es(r.descricao)+'</td><td class="neg">'+fmt(r.valor)+'</td></tr>';}).join("");
    return'<div class="cc">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">'
      +'<div><div style="font-size:17px;font-weight:800;color:#f1f5f9">💳 '+es(c.nome)+'</div>'+(c.bandeira?'<div style="font-size:11px;color:#71717a;margin-top:2px">'+es(c.bandeira)+'</div>':'')+'</div>'
      +'<button class="eb" onclick="openCartao(\''+c.id+'\')">✏️ Editar</button>'
      +'</div>'
      +'<div class="g3" style="margin-bottom:12px">'
      +'<div><div style="font-size:9px;color:#71717a;text-transform:uppercase;letter-spacing:.6px">Limite</div><div style="font-size:18px;font-weight:800;color:var(--cyan)">'+fmt(lim)+'</div></div>'
      +'<div><div style="font-size:9px;color:#71717a;text-transform:uppercase;letter-spacing:.6px">Fatura '+MESES[S.month].substring(0,3)+'</div><div style="font-size:18px;font-weight:800;color:var(--red)">'+fmt(tFat)+'</div></div>'
      +'<div><div style="font-size:9px;color:#71717a;text-transform:uppercase;letter-spacing:.6px">Disponível</div><div style="font-size:18px;font-weight:800;color:'+cor+'">'+fmt(livre)+'</div></div>'
      +'</div>'
      +'<div class="prg-bg"><div class="prg-fill" style="width:'+pct+'%;background:'+cor+'"></div></div>'
      +'<div style="display:flex;justify-content:space-between;font-size:10px;color:#71717a;margin-top:5px">'
      +(c.fechamentoDia?'<span>Fecha dia '+c.fechamentoDia+'</span>':'<span></span>')
      +(c.vencimentoDia?'<span>Vence dia '+c.vencimentoDia+'</span>':'<span></span>')
      +'</div>'
      +(fat.length?'<div style="margin-top:14px;border-top:1px solid rgba(255,255,255,.08);padding-top:12px">'
        +'<div style="font-size:9px;color:#71717a;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">Lançamentos do mês</div>'
        +'<div class="ox"><table><thead><tr><th>Data</th><th>Descrição</th><th>Valor</th></tr></thead><tbody>'+rows
        +(fat.length>6?'<tr><td colspan="3" style="color:var(--tx3);font-size:11px">+ '+(fat.length-6)+' mais...</td></tr>':'')
        +'</tbody></table></div></div>':'')
      +'</div>';
  }).join("");
  return'<div class="pg">'

// ── MAMÃE ────────────────────────────────────────────────────────────────────
function rMamae(lmR,lmD){
  var recMae=lmR.filter(function(r){return r.pessoa==="Mamãe";});
  var despMae=lmD.filter(function(r){return r.pessoa==="Mamãe";});
  var fixRec=getFixosRec().filter(function(f){return f.pessoa==="Mamãe";});
  var tR=recMae.reduce(function(s,r){return s+r.valor;},0)||fixRec.reduce(function(s,f){return s+f.valor;},0);
  var tD=despMae.reduce(function(s,r){return s+r.valor;},0);
  var saldo=tR-tD;
  var byCat={};despMae.forEach(function(r){var c=r.categoria||"Outros";byCat[c]=(byCat[c]||0)+r.valor;});
  var catD=Object.keys(byCat).map(function(k){return{n:k,v:byCat[k]};}).sort(function(a,b){return b.v-a.v;});
  var rows=despMae.map(function(r){return'<tr><td>'+fdt(r.date)+'</td><td>'+es(r.descricao)+'</td><td>'+es(r.categoria||"")+'</td><td class="neg">'+fmt(r.valor)+'</td></tr>';}).join("");
  return'<div class="pg"><div class="ph"><h2>👵 Financeiro da Mamãe</h2></div>'
    +'<div class="kg">'
    +kp("Benefícios/Receitas",fmt(tR),"LOAS + Irmão","#22c55e")
    +kp("Despesas",fmt(tD),despMae.length+" lançamentos","#f87171")
    +kp("Saldo",fmt(saldo),saldo>=0?"✅ coberto":"⚠️ família complementa",saldo>=0?"#22c55e":"#fbbf24")
    +'</div>'
    +'<div class="g2" style="gap:12px">'
    +'<div class="cd"><div class="ct">Entradas / Benefícios</div>'
    +fixRec.map(function(f){return'<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd)"><span style="font-size:13px;color:var(--tx2)">'+es(f.desc)+' <span style="font-size:10px;color:var(--tx3)">(referência)</span></span><span style="font-weight:700;color:#22c55e">'+fmt(f.valor)+'</span></div>';}).join("")
    +(recMae.length?recMae.map(function(r){return'<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd)"><span style="font-size:13px;color:var(--tx2)">'+es(r.descricao)+' <span style="font-size:10px;color:var(--cyan)">lançado '+fdt(r.date)+'</span></span><span style="font-weight:700;color:#22c55e">'+fmt(r.valor)+'</span></div>';}).join(""):"")
    +'</div>'
    +'<div class="cd"><div class="ct">Despesas por Categoria</div>'+(catD.length?bhC(catD,"#a78bfa"):'<div class="emp">Nenhuma despesa da mamãe lançada</div>')+'</div>'
    +'</div>'
    +(despMae.length?'<div class="cd"><div class="ct">Lançamentos Detalhados</div><div class="ox"><table><thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th style="text-align:right">Valor</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>':'')
    +'</div>';
}

// ── FAMÍLIA ──────────────────────────────────────────────────────────────────
function rFamilia(lmD){
  var byP={};lmD.forEach(function(r){var p=r.pessoa||"Outros";byP[p]=(byP[p]||0)+r.valor;});
  var tot=lmD.reduce(function(s,r){return s+r.valor;},0);
  var emojis={Casa:"🏠",Anton:"👨",Josiane:"👩",Mamãe:"👵",Marcos:"👦",Geovanna:"👧",Lorran:"👦",Cachorros:"🐕",Geral:"📦"};
  var cores={Casa:"#22d3ee",Anton:"#3b82f6",Josiane:"#f472b6",Mamãe:"#a78bfa",Marcos:"#34d399",Geovanna:"#fbbf24",Lorran:"#fb923c",Cachorros:"#f87171",Geral:"#71717a"};
  var order=["Casa","Anton","Josiane","Mamãe","Marcos","Geovanna","Lorran","Cachorros","Geral"];
  var pieD=Object.keys(byP).map(function(k){return{n:(emojis[k]||"")+" "+k,v:byP[k],cor:cores[k]};}).sort(function(a,b){return b.v-a.v;});
  var cards=order.filter(function(p){return byP[p]>0;}).map(function(p){
    var v=byP[p];
    var pct=tot?Math.round(v/tot*100):0;
    var itens=lmD.filter(function(r){return r.pessoa===p;});
    var cor=cores[p]||"#22d3ee";
    return'<div class="cd">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      +'<div style="font-size:14px;font-weight:700;color:var(--tx)">'+(emojis[p]||"")+" "+p+'</div>'
      +'<div style="font-size:16px;font-weight:800;color:var(--red)">'+fmt(v)+'</div>'
      +'</div>'
      +'<div class="prg-bg"><div class="prg-fill" style="width:'+pct+'%;background:'+cor+'"></div></div>'
      +'<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--tx3);margin-top:5px"><span>'+pct+'% do total</span><span>'+itens.length+' lançamentos</span></div>'
      +'</div>';
  }).join("");
  return'<div class="pg"><div class="ph"><h2>👨‍👩‍👧 Família — '+nomeMes()+'</h2></div>'
    +'<div class="g2" style="gap:12px">'
    +'<div class="cd"><div class="ct">Distribuição por Pessoa / Grupo</div>'+piC(pieD)+'</div>'
    +'<div class="cd"><div class="ct">Ranking de Gastos</div>'+bhC(pieD.slice(0,8))+'</div>'
    +'</div>'
    +'<div class="g2" style="gap:10px">'+cards+'</div>'
    +'</div>';
}

// ── ABA PESSOA (Anton / Josiane) ─────────────────────────────────────────────
// Saldo individual = Receitas próprias − Metade fixos casa − Gastos próprios
// Fixos da Mamãe são cobertos pela receita da Mamãe (LOAS + irmão), não divididos
function rPessoa(nome,emoji,cor,lm){
  var catsRec=nome==="Anton"?CAT_REC["Anton"]:nome==="Josiane"?CAT_REC["Josiane"]:[];
  var recIds={};
  var rec=lm.filter(function(r){
    if(r.tipo!=="receita")return false;
    var match=r.pessoa===nome||(catsRec.indexOf(r.categoria)>=0);
    if(!match||recIds[r.id])return false;
    recIds[r.id]=true;return true;
  });
  var despProp=lm.filter(function(r){return r.tipo==="despesa"&&r.pessoa===nome;});
  var despCasa=lm.filter(function(r){return r.tipo==="despesa"&&r.pessoa==="Casa";});
  var tR=rec.reduce(function(s,r){return s+r.valor;},0);
  var tProp=despProp.reduce(function(s,r){return s+r.valor;},0);
  var tCasaMetade=despCasa.reduce(function(s,r){return s+r.valor;},0)/2;
  var tVar=tProp+tCasaMetade;
  var fixosCasa=getFixosDesp().filter(function(f){return f.pessoa!=="Mamãe";});
  var metadeFixos=fixosCasa.reduce(function(s,f){return s+f.valor;},0)/2;
  var salRef=getFixosRec().filter(function(f){return f.pessoa===nome;}).reduce(function(s,f){return s+f.valor;},0);
  var saldo=tR-metadeFixos-tVar;
  var corS=saldo>=0?"#22c55e":"#f87171";
  var byCat={};
  despProp.forEach(function(r){var c=r.categoria||"Outros";byCat[c]=(byCat[c]||0)+r.valor;});
  despCasa.forEach(function(r){var c=(r.categoria||"Outros")+" (Casa÷2)";byCat[c]=(byCat[c]||0)+r.valor/2;});
  var catArr=Object.keys(byCat).map(function(k){return{n:k,v:byCat[k]};}).sort(function(a,b){return b.v-a.v;});
  var tot=tVar||1;
  var COLS=["#22d3ee","#22c55e","#f87171","#fbbf24","#a78bfa","#fb923c","#f472b6","#60a5fa","#34d399","#e879f9"];
  var pctBlock=catArr.map(function(d,i){
    var pct=Math.round(d.v/tot*100);var col=COLS[i%COLS.length];
    return'<div style="margin-bottom:12px">'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:4px">'
      +'<span style="font-size:12px;color:var(--tx2)">'+es(d.n)+'</span>'
      +'<span style="font-size:12px;font-weight:700;color:var(--tx)">'+pct+'% \xb7 '+fmt(d.v)+'</span>'
      +'</div>'
      +'<div class="prg-bg"><div class="prg-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'
      +'</div>';
  }).join("");
  var recRows=rec.slice().sort(function(a,b){return(b.date||"").localeCompare(a.date||"");}).map(function(r){
    var isCom=catsRec.indexOf(r.categoria)>=0&&r.pessoa!==nome;
    return'<tr><td>'+fdt(r.date)+'</td><td style="color:var(--tx)">'+es(r.descricao)
      +(isCom?' <span style="font-size:9px;background:#0c4a6e;color:#7dd3fc;padding:1px 5px;border-radius:8px">comiss\xe3o</span>':'')
      +'</td><td>'+es(r.categoria||"")+'</td><td class="hi">+'+fmt(r.valor)+'</td>'
      +'<td><button class="eb" onclick="openLanc(\''+r.id+'\')">&#9998;</button></td></tr>';
  }).join("");
  var despRows=despProp.slice().sort(function(a,b){return(b.date||"").localeCompare(a.date||"");}).map(function(r){
    return'<tr><td>'+fdt(r.date)+'</td><td style="color:var(--tx)">'+es(r.descricao)+'</td>'
      +'<td>'+es(r.categoria||"")+'</td><td style="font-size:11px;color:var(--tx3)">'+es(r.formaPagamento||"")+'</td>'
      +'<td class="neg">\u2212'+fmt(r.valor)+'</td>'
      +'<td><button class="eb" onclick="openLanc(\''+r.id+'\')">&#9998;</button></td></tr>';
  }).join("");
  var casaRows=despCasa.slice().sort(function(a,b){return(b.date||"").localeCompare(a.date||"");}).map(function(r){
    return'<tr><td>'+fdt(r.date)+'</td><td style="color:var(--tx)">'+es(r.descricao)+'</td>'
      +'<td>'+es(r.categoria||"")+'</td><td style="font-size:11px;color:var(--tx3)">'+es(r.formaPagamento||"")+'</td>'
      +'<td class="neg">\u2212'+fmt(r.valor/2)+' <span style="font-size:9px;color:var(--tx3)">\xf72</span></td>'
      +'<td><button class="eb" onclick="openLanc(\''+r.id+'\')">&#9998;</button></td></tr>';
  }).join("");
  var fixRows=fixosCasa.map(function(f){
    return'<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd)">'
      +'<span style="font-size:12px;color:var(--tx2)">'+es(f.desc)+'<span style="font-size:10px;color:var(--tx3);margin-left:6px">\xf72</span></span>'
      +'<span style="font-size:13px;font-weight:700;color:var(--red)">\u2212'+fmt(f.valor/2)+'</span></div>';
  }).join("");
  return'<div class="pg"><div class="ph"><h2>'+emoji+' '+nome+' \u2014 '+nomeMes()+'</h2>'
    +'<button class="ab" onclick="openLanc()">\uff0b Lan\xe7amento</button></div>'
    +'<div class="kg">'
    +kp("Receitas",fmt(tR),rec.length+" lan\xe7amentos","#22c55e")
    +kp("Fixos (sua metade)",fmt(metadeFixos),"autom\xe1tico \xf72","#f87171")
    +kp("Gastos Pr\xf3prios",fmt(tProp),despProp.length+" itens","#fbbf24")
    +kp("Casa (sua metade)",fmt(tCasaMetade),despCasa.length+" itens \xf72","#fb923c")
    +kp("SALDO INDIVIDUAL",fmt(saldo),saldo>=0?"\u2705 sobrou":"\u26a0\ufe0f negativo",corS)
    +'</div>'
    +'<div class="g2" style="gap:12px">'
    +'<div>'
    +'<div class="cd"><div class="ct" style="color:#22c55e">\ud83d\udce5 Receitas de '+nome+' (Sal\xe1rio + Comiss\xf5es)</div>'
    +(rec.length
      ?'<div class="ox"><table><thead><tr><th>Data</th><th>Descri\xe7\xe3o</th><th>Categoria</th><th style="text-align:right">Valor</th><th></th></tr></thead><tbody>'+recRows+'</tbody></table></div>'
      :'<div style="padding:10px 0"><div style="font-size:13px;color:var(--tx2)">Sal\xe1rio refer\xeancia: <b style="color:#22c55e">'+fmt(salRef)+'</b></div>'
      +'<div style="font-size:11px;color:var(--tx3);margin-top:4px">Lance com Pessoa = '+nome+' ou categoria de comiss\xe3o</div></div>')
    +'<button onclick="openLancRec(\''+nome+'\')" style="margin-top:10px;cursor:pointer;background:#052e16;color:#86efac;border:1px solid #166534;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600">\uff0b Sal\xe1rio / Comiss\xe3o</button>'
    +'</div>'
    +'<div class="cd"><div class="ct" style="color:var(--red)">\ud83d\udccc Fixos de Casa (sua metade)</div>'
    +fixRows
    +'<div style="display:flex;justify-content:space-between;padding-top:10px;margin-top:4px;border-top:1px solid var(--bd)"><span style="font-size:12px;color:var(--tx2)">Total sua parte</span><span style="font-weight:700;color:var(--red)">\u2212'+fmt(metadeFixos)+'</span></div>'
    +'<div style="font-size:10px;color:var(--tx3);margin-top:6px">Fixos da Mam\xe3e (cuidadora etc.) cobertos por LOAS + irm\xe3o</div>'
    +'</div>'
    +'</div>'
    +'<div>'
    +'<div class="cd"><div class="ct">\ud83d\udcca Percentual por Categoria</div>'
    +(pctBlock||'<div class="emp">Nenhum gasto lan\xe7ado</div>')+'</div>'
    +(catArr.length?'<div class="cd"><div class="ct">Distribui\xe7\xe3o Visual</div>'+piC(catArr)+'</div>':'')
    +'</div>'
    +'</div>'
    +'<div class="dl-bloco" style="margin-top:4px"><div class="dl-total" style="border-top:none;padding:16px">'
    +'<div><div style="font-size:11px;color:var(--tx3)">SALDO \u2014 '+nome+'</div>'
    +'<div style="font-size:10px;color:var(--tx3)">Receitas \u2212 Fixos\xf72 \u2212 Gastos pr\xf3prios \u2212 Casa\xf72</div></div>'
    +'<span style="font-size:22px;font-weight:800;color:'+corS+'">'+fmt(saldo)+'</span></div></div>'
    +(despProp.length?'<div class="cd"><div class="ct">Gastos Pessoais de '+nome+'</div>'
      +'<div class="ox"><table><thead><tr><th>Data</th><th>Descri\xe7\xe3o</th><th>Categoria</th><th>Pgto</th><th style="text-align:right">Valor</th><th></th></tr></thead><tbody>'
      +despRows+'</tbody></table></div></div>':"")
    +(despCasa.length?'<div class="cd"><div class="ct">Gastos de Casa \u2014 sua metade (\xf72)</div>'
      +'<div class="ox"><table><thead><tr><th>Data</th><th>Descri\xe7\xe3o</th><th>Categoria</th><th>Pgto</th><th style="text-align:right">Sua parte</th><th></th></tr></thead><tbody>'
      +casaRows+'</tbody></table></div></div>':"")
    +(despProp.length===0&&despCasa.length===0
      ?'<div class="cd"><div class="emp">Nenhum gasto de '+nome+' lan\xe7ado neste m\xeas.</div></div>':'')
    +'</div>';
}

var _cfgR=null,_cfgD=null;
function cfgAddF(t){
  var d=document.getElementById("f"+(t==="r"?"r":"d")+"-new-d").value.trim();
  var v=parseFloat(document.getElementById("f"+(t==="r"?"r":"d")+"-new-v").value)||0;
  if(!d||!v)return alert("Informe descrição e valor.");
  if(t==="r"){if(!_cfgR)_cfgR=getFixosRec().slice();_cfgR.push({desc:d,valor:v,pessoa:"Geral"});}
  else{if(!_cfgD)_cfgD=getFixosDesp().slice();_cfgD.push({desc:d,valor:v,pessoa:"Casa"});}
  cfgSaveF(true);
}
function cfgRmF(t,i){
  if(t==="r"){if(!_cfgR)_cfgR=getFixosRec().slice();_cfgR.splice(i,1);}
  else{if(!_cfgD)_cfgD=getFixosDesp().slice();_cfgD.splice(i,1);}
  cfgSaveF(true);
}
function cfgSaveF(redraw){
  var fr=_cfgR||getFixosRec().slice();var fd=_cfgD||getFixosDesp().slice();
  fr.forEach(function(f,i){var d=document.getElementById("fr-d-"+i);var v=document.getElementById("fr-v-"+i);if(d)f.desc=d.value;if(v)f.valor=parseFloat(v.value)||f.valor;});
  fd.forEach(function(f,i){var d=document.getElementById("fd-d-"+i);var v=document.getElementById("fd-v-"+i);if(d)f.desc=d.value;if(v)f.valor=parseFloat(v.value)||f.valor;});
  D.fixosRec=fr;D.fixosDesp=fd;
  db.collection("config").doc("fixos").set({receitas:fr,despesas:fd});
  if(redraw)rT();else showToast("✅ Configurações salvas!");
}

// ── MODAL LANÇAMENTO ─────────────────────────────────────────────────────────
function openLanc(editId){
  var rec=editId?D.lanc.find(function(r){return r.id===editId;}):null;
  var tipo=rec?rec.tipo:"despesa";
  function catOpts(tp){
    var src=tp==="receita"?CAT_REC:CAT_DESP;var opts='<option value="">Selecione...</option>';
    Object.keys(src).forEach(function(g){src[g].forEach(function(c){opts+='<option value="'+es(c)+'"'+(rec&&rec.categoria===c?" selected":"")+">"+es(g)+" → "+es(c)+"</option>";});});
    return opts;
  }
  var pesOpts=PESSOAS.map(function(p){return"<option"+(rec&&rec.pessoa===p?" selected":"")+">"+p+"</option>";}).join("");
  var fOpts=FORMAS.map(function(f){return"<option"+(rec&&rec.formaPagamento===f?" selected":"")+">"+f+"</option>";}).join("");
  var cOpts='<option value="">Selecione...</option>'+D.cartoes.map(function(c){return'<option value="'+c.id+'"'+(rec&&rec.cartaoId===c.id?" selected":"")+">"+es(c.nome)+"</option>";}).join("");
  var I='background:var(--bg);border:1px solid var(--bd2);color:var(--tx);border-radius:7px;padding:9px 11px;font-size:13px;width:100%;font-family:inherit';
  var html=mhdr(editId?"✏️ Editar Lançamento":"💰 Novo Lançamento")
    +'<div class="type-tog">'
    +'<button class="t-btn'+(tipo==="receita"?" on-r":"")+'" id="bt-r" onclick="tglTipo(\'receita\')">📥 Receita</button>'
    +'<button class="t-btn'+(tipo==="despesa"?" on-d":"")+'" id="bt-d" onclick="tglTipo(\'despesa\')">📤 Despesa</button>'
    +'</div>'
    +'<input type="hidden" id="ln-tipo" value="'+tipo+'">'
    +(editId?'<input type="hidden" id="ln-id" value="'+editId+'">':'')
    +'<div class="fi"><label>Descrição</label><input type="text" id="ln-desc" placeholder="Ex: Compra no Shibata" value="'+es(rec?rec.descricao:"")+'"></div>'
    +'<div class="g2">'
    +'<div class="fi"><label>Data</label><input type="date" id="ln-data" value="'+(rec?rec.date:hj())+'"></div>'
    +'<div class="fi"><label>Valor (R$)</label><input type="number" id="ln-val" placeholder="0,00" value="'+(rec?rec.valor:"")+'" step="0.01" min="0"></div>'
    +'</div>'
    +'<div class="g2">'
    +'<div class="fi"><label>Categoria</label><select id="ln-cat" style="'+I+'">'+catOpts(tipo)+'</select></div>'
    +'<div class="fi"><label>Centro de Custo / Pessoa</label><select id="ln-pes" style="'+I+'">'+pesOpts+'</select></div>'
    +'</div>'
    +'<div class="fi"><label>Forma de Pagamento</label><select id="ln-forma" onchange="tglCartao()" style="'+I+'">'+fOpts+'</select></div>'
    +'<div id="ln-cc-area" style="'+(rec&&rec.formaPagamento==="Crédito"?"":"display:none")+'">'
    +'<div class="fi"><label>Cartão</label><select id="ln-cartao" style="'+I+'">'+cOpts+'</select></div>'
    +'<div class="fi"><label>Número de Parcelas</label><select id="ln-parc" style="'+I+'"><option value="1">À vista (1×)</option>'
    +[2,3,4,5,6,7,8,9,10,12,18,24].map(function(n){return'<option value="'+n+'"'+(rec&&rec.parcelas===n?" selected":"")+">"+n+"×</option>";}).join("")+'</select></div>'
    +'</div>'
    +'<div class="fi"><label>Observações (opcional)</label><input type="text" id="ln-obs" placeholder="..." value="'+es(rec?rec.obs||"":"")+'"></div>'
    +'<button class="pb" onclick="savLanc()" style="width:100%;margin-top:8px;padding:12px">'+(editId?"💾 Salvar Alteração":"✅ Registrar")+'</button>';
  omod(html);
  requestAnimationFrame(function(){requestAnimationFrame(function(){tglCartao();});});
}
function tglTipo(t){
  document.getElementById("ln-tipo").value=t;
  document.getElementById("bt-r").className="t-btn"+(t==="receita"?" on-r":"");
  document.getElementById("bt-d").className="t-btn"+(t==="despesa"?" on-d":"");
  var src=t==="receita"?CAT_REC:CAT_DESP;var opts='<option value="">Selecione...</option>';
  Object.keys(src).forEach(function(g){src[g].forEach(function(c){opts+='<option value="'+es(c)+'">'+es(g)+" → "+es(c)+"</option>";});});
  var el=document.getElementById("ln-cat");if(el)el.innerHTML=opts;
}
function tglCartao(){
  var f=document.getElementById("ln-forma");
  var a=document.getElementById("ln-cc-area");
  if(a)a.style.display=f&&f.value==="Crédito"?"block":"none";
}
function savLanc(){
  var tipo=document.getElementById("ln-tipo").value;
  var desc=(document.getElementById("ln-desc").value||"").trim();
  var data=document.getElementById("ln-data").value;
  var val=parseFloat(document.getElementById("ln-val").value)||0;
  var cat=(document.getElementById("ln-cat").value||"").trim();
  var pes=document.getElementById("ln-pes").value;
  var forma=document.getElementById("ln-forma").value;
  var obs=(document.getElementById("ln-obs").value||"").trim();
  if(!desc)return alert("Informe a descrição.");
  if(!val)return alert("Informe o valor.");
  if(!data)return alert("Informe a data.");
  var editEl=document.getElementById("ln-id");var editId=editEl?editEl.value:"";
  var cEl=document.getElementById("ln-cartao");var cartaoId=cEl?cEl.value:"";
  var cartaoNome="";
  if(cartaoId){var ci=D.cartoes.find(function(c){return c.id===cartaoId;});cartaoNome=ci?ci.nome:"";}
  var parcEl=document.getElementById("ln-parc");var parcelas=parcEl?parseInt(parcEl.value)||1:1;
  if(editId){
    db.collection("lancamentos").doc(editId).update({descricao:desc,date:data,valor:val,tipo:tipo,categoria:cat,pessoa:pes,formaPagamento:forma,cartaoId:cartaoId||null,cartaoNome:cartaoNome||null,obs:obs});
    showToast("✅ Lançamento atualizado!");cmod();return;
  }
  if(forma==="Crédito"&&parcelas>1){
    var grupoId=uid();var batch=db.batch();var dtParc=data;
    for(var p=1;p<=parcelas;p++){
      var r={id:uid(),descricao:desc+" ("+p+"/"+parcelas+")",date:dtParc,valor:+(val/parcelas).toFixed(2),tipo:tipo,categoria:cat,pessoa:pes,formaPagamento:forma,cartaoId:cartaoId||null,cartaoNome:cartaoNome||null,parcelado:true,parcelas:parcelas,parcelaAtual:p,grupoId:grupoId,obs:obs};
      batch.set(db.collection("lancamentos").doc(r.id),r);
      var dt=new Date(dtParc);dt.setMonth(dt.getMonth()+1);
      dtParc=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
    }
    batch.commit().then(function(){showToast("✅ "+parcelas+"× parcelas registradas!");cmod();});
  }else{
    var r2={id:uid(),descricao:desc,date:data,valor:val,tipo:tipo,categoria:cat,pessoa:pes,formaPagamento:forma,cartaoId:cartaoId||null,cartaoNome:cartaoNome||null,parcelado:false,parcelas:1,parcelaAtual:1,obs:obs};
    db.collection("lancamentos").doc(r2.id).set(r2).then(function(){showToast("✅ Lançamento registrado!");cmod();});
  }
}
function delLanc(id,desc){
  if(!confirm("Excluir: "+desc+"?"))return;
  db.collection("lancamentos").doc(id).delete();showToast("🗑 Excluído.");
}

// ── MODAL CARTÃO ─────────────────────────────────────────────────────────────
function openCartao(editId){
  var c=editId?D.cartoes.find(function(x){return x.id===editId;}):null;
  var I='background:var(--bg);border:1px solid var(--bd2);color:var(--tx);border-radius:7px;padding:9px 11px;font-size:13px;width:100%;font-family:inherit';
  var html=mhdr(editId?"✏️ Editar Cartão":"💳 Adicionar Cartão")
    +(editId?'<input type="hidden" id="ct-id" value="'+editId+'">':'')
    +'<div class="fi"><label>Nome do Cartão</label><input type="text" id="ct-nm" placeholder="Ex: Renner, Inter Josiane" value="'+es(c?c.nome:"")+'"></div>'
    +'<div class="fi"><label>Bandeira</label><input type="text" id="ct-bd" placeholder="Visa / Mastercard / Renner / Elo" value="'+es(c&&c.bandeira?c.bandeira:"")+'></div>'
    +'<div class="fi"><label>Limite (R$)</label><input type="number" id="ct-lim" placeholder="Ex: 3000" value="'+(c?c.limite||"":"")+'" step="0.01" min="0"></div>'
    +'<div class="g2">'
    +'<div class="fi"><label>Dia de Fechamento</label><input type="number" id="ct-fec" placeholder="1-31" min="1" max="31" value="'+(c&&c.fechamentoDia?c.fechamentoDia:"")+'"></div>'
    +'<div class="fi"><label>Dia de Vencimento</label><input type="number" id="ct-ven" placeholder="1-31" min="1" max="31" value="'+(c&&c.vencimentoDia?c.vencimentoDia:"")+'"></div>'
    +'</div>'
    +'<div style="display:flex;gap:8px;margin-top:8px">'
    +'<button class="pb" onclick="savCartao()" style="flex:1;padding:11px">💾 Salvar</button>'
    +(editId?'<button class="db" onclick="delCartao(\''+editId+'\')" style="padding:11px 16px">🗑 Excluir</button>':'')
    +'</div>';
  omod(html);
}
function savCartao(){
  var nm=(document.getElementById("ct-nm").value||"").trim();
  if(!nm)return alert("Informe o nome do cartão.");
  var editId=(document.getElementById("ct-id")||{}).value||"";
  var rec={nome:nm,bandeira:(document.getElementById("ct-bd").value||"").trim(),limite:parseFloat(document.getElementById("ct-lim").value)||0,fechamentoDia:parseInt(document.getElementById("ct-fec").value)||null,vencimentoDia:parseInt(document.getElementById("ct-ven").value)||null};
  if(editId)db.collection("cartoes").doc(editId).update(rec);
  else{rec.id=uid();db.collection("cartoes").doc(rec.id).set(rec);}
  showToast("✅ Cartão salvo!");cmod();
}
function delCartao(id){
  if(!confirm("Excluir este cartão?"))return;
  db.collection("cartoes").doc(id).delete();showToast("🗑 Cartão excluído.");cmod();
}

// ── EVENTOS ──────────────────────────────────────────────────────────────────
document.addEventListener("keydown",function(e){if(e.key==="Escape")cmod();});
document.getElementById("l-pw").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
// ── PWA SERVICE WORKER ───────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(e){console.log('SW:',e);});
  });
}

document.getElementById("l-em").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("l-pw").focus();});
</script>
